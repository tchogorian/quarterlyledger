<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Munger's Checklist · The Quarterly Ledger</title>
<meta name="description" content="A private investment discipline. Read the report. Invert the thesis. Wait for the fat pitch.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; }
  .mc-root {
    --paper: #f3ecdc;
    --paper-2: #ede4cf;
    --paper-line: #d9ceb1;
    --ink: #1a1611;
    --ink-2: #443a2a;
    --ink-3: #6b5d44;
    --rule: #c8b994;
    --gold: #8a6a1f;
    --gold-soft: #c8a253;
    --moss: #2f4a2a;
    --moss-soft: #5a7a4f;
    --oxblood: #6e1f1a;
    --oxblood-soft: #a64a3e;
    --crimson-tint: #f3dad4;
    --moss-tint: #dde6d3;
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    background-color: var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(138,106,31,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(46,74,42,0.05), transparent 40%);
    min-height: 100vh;
  }
  .mc-display { font-family: 'Fraunces', 'Times New Roman', serif; letter-spacing: -0.01em; }
  .mc-mono { font-family: 'JetBrains Mono', monospace; }

  .mc-card {
    background-color: var(--paper-2);
    border: 1px solid var(--rule);
    box-shadow: 0 1px 0 rgba(26,22,17,0.04), 0 8px 24px -16px rgba(26,22,17,0.18);
  }
  .mc-input {
    background-color: rgba(255,253,247,0.6);
    border: 1px solid var(--rule);
    color: var(--ink);
    font-family: inherit;
    transition: border-color 120ms, background 120ms;
  }
  .mc-input:focus {
    outline: none;
    border-color: var(--gold);
    background-color: #fffdf7;
  }
  .mc-input.mc-mono { font-family: 'JetBrains Mono', monospace; }

  .mc-btn {
    border: 1px solid var(--ink);
    background-color: var(--ink);
    color: var(--paper);
    font-family: 'Fraunces', serif;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-size: 0.78rem;
    padding: 0.6rem 1.1rem;
    transition: transform 80ms, box-shadow 120ms;
    cursor: pointer;
  }
  .mc-btn:hover { box-shadow: 0 2px 0 var(--gold); transform: translate(-1px,-1px); }
  .mc-btn:active { transform: translate(0,0); }
  .mc-btn-ghost {
    background: transparent; color: var(--ink); border-color: var(--ink-3);
  }
  .mc-btn-ghost:hover { background: var(--paper-2); box-shadow: 0 2px 0 var(--ink-3); }

  .mc-tab {
    font-family: 'Fraunces', serif;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 0.72rem;
    padding: 0.5rem 0;
    margin-right: 1.5rem;
    color: var(--ink-3);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color 120ms, border-color 120ms;
    background: transparent;
    border-top: none; border-left: none; border-right: none;
  }
  .mc-tab.active { color: var(--ink); border-bottom-color: var(--gold); }
  .mc-tab:hover { color: var(--ink); }

  .mc-pill {
    font-family: 'Fraunces', serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 0.62rem;
    padding: 0.22rem 0.5rem;
    border: 1px solid currentColor;
    display: inline-block;
  }
  .mc-pill-pass { color: var(--moss); background: var(--moss-tint); }
  .mc-pill-fail { color: var(--oxblood); background: var(--crimson-tint); }
  .mc-pill-pending { color: var(--ink-3); background: rgba(0,0,0,0.03); }

  .mc-rule { border-top: 1px solid var(--rule); }
  .mc-rule-thick { border-top: 3px double var(--rule); }

  .mc-roman {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-style: italic;
    color: var(--gold);
    line-height: 1;
  }

  .mc-answer-btn {
    border: 1px solid var(--rule);
    background: rgba(255,253,247,0.4);
    color: var(--ink-3);
    transition: all 120ms;
    cursor: pointer;
    font-family: 'Fraunces', serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 0.7rem;
  }
  .mc-answer-btn:hover { background: rgba(255,253,247,0.9); color: var(--ink); }
  .mc-answer-btn.active-yes { background: var(--moss); color: #f5f1e6; border-color: var(--moss); }
  .mc-answer-btn.active-no { background: var(--oxblood); color: #f5e8e3; border-color: var(--oxblood); }
  .mc-answer-btn.active-skip { background: var(--ink-3); color: var(--paper); border-color: var(--ink-3); }

  .mc-section-toggle {
    background: transparent; border: none; cursor: pointer;
    font-family: inherit; color: inherit; text-align: left;
  }
  .mc-section-toggle:hover { background: rgba(138,106,31,0.04); }

  .mc-toast {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Fraunces', serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 0.72rem;
    padding: 0.7rem 1.1rem;
    border-left: 3px solid var(--gold);
    animation: mc-fadein 200ms ease-out;
  }
  @keyframes mc-fadein { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }

  .mc-empty-icon { color: var(--ink-3); opacity: 0.4; }

  textarea.mc-input { resize: vertical; min-height: 56px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ─── localStorage adapter ──────────────────────────────────────────────────
const storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error('Key not found: ' + key);
    return { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  },
  async delete(key) {
    const existed = localStorage.getItem(key) !== null;
    localStorage.removeItem(key);
    return { key, deleted: existed };
  },
  async list(prefix = '') {
    const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
    return { keys };
  }
};

// ─── Icons (inline SVG) ────────────────────────────────────────────────────
const Icon = ({ children, size = 16, className = '', style = {} }) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
    fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
    className={className} style={style}>
    {children}
  </svg>
);
const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
const XIcon = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
const Minus = (p) => <Icon {...p}><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
const ChevronUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15"/></Icon>;
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></Icon>;
const Edit3 = (p) => <Icon {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></Icon>;
const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
const Bookmark = (p) => <Icon {...p}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></Icon>;
const Inbox = (p) => <Icon {...p}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></Icon>;
const CircleDot = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/></Icon>;

// ─── THE CHECKLIST ─────────────────────────────────────────────────────────
const CHECKLIST = [
  {
    id: 'competence', roman: 'I',
    title: 'Circle of Competence',
    subtitle: 'Do I actually understand this?',
    items: [
      'I can explain how it makes money in two sentences — without jargon',
      'This business will look roughly the same in 10 years',
      'I can name the moat specifically (brand / switching costs / network / scale / regulatory)',
      'It has pricing power — could raise prices 10% without losing customers',
    ],
  },
  {
    id: 'numbers', roman: 'II',
    title: 'The Numbers',
    subtitle: "Buffett's hard floor",
    items: [
      'Ten years of revenue and earnings look like a staircase, not a rollercoaster',
      'ROE consistently above ~15% — without leverage juicing it',
      'Owner earnings (NI + D&A − maintenance capex) close to GAAP earnings',
      'Gross margins stable or expanding — the pricing-power tell',
      'Long-term debt manageable in a 24-month credit drought',
      'Each $1 of retained earnings has produced ≥$1 of market value over a decade',
    ],
  },
  {
    id: 'management', roman: 'III',
    title: 'Management & Incentives',
    subtitle: '"Show me the incentive and I\'ll show you the outcome"',
    items: [
      'Comp tied to per-share intrinsic value — not stock price gaming or revenue at any cost',
      'Insiders bought stock with their own cash, not just received options',
      'CEO letter is plain English and partner-style, not corporate twaddle',
      'Management names mistakes specifically — not passive-voice apologies',
      'No "one-time" charges that somehow happen every year',
      'No excessive self-regard signals (jets, magazine covers, name on building, empire-building M&A)',
      'No suspicious CFO or auditor turnover',
    ],
  },
  {
    id: 'crowd', roman: 'IV',
    title: 'The Crowd',
    subtitle: 'What is everyone else doing, and why?',
    items: [
      'NOT a hot story stock everyone is piling into right now',
      'NOT buying because some authority (Buffett, Burry, a podcast) bought it',
      "NOT riding a fashion-sector halo (AI, GLP-1, nuclear) it didn't earn",
      'Low twaddle ratio in 10-K and earnings calls — content > buzzwords',
    ],
  },
  {
    id: 'head', roman: 'V',
    title: 'My Own Head',
    subtitle: 'Invert, always invert',
    items: [
      'NOT rushing to escape the discomfort of uncertainty (doubt-avoidance)',
      "Haven't already told people I like this name (commitment bias)",
      "Haven't fallen for the CEO/product/story so much I stopped looking for problems",
      'NOT buying because it ran without me (FOMO / deprival superreaction)',
      'NOT overweighting whatever happened in the last two weeks (availability)',
      'NOT making this call right after a big win, big loss, or three drinks in',
    ],
  },
  {
    id: 'premortem', roman: 'VI',
    title: 'The Pre-Mortem',
    subtitle: 'Inversion in practice — write before buying',
    items: [
      'I have written down the most likely path to zero in 5 years',
      'I have written down what would have to be true to lose 90%',
      'I have honestly tried to break my own thesis — best short argument identified',
    ],
  },
  {
    id: 'lollapalooza', roman: 'VII',
    title: 'Lollapalooza Check',
    subtitle: 'Things rarely go right or wrong for one reason',
    items: [
      '3+ independent BULLISH tailwinds aligning (moat + capital allocator + valuation + runway)',
      'NOT seeing 3+ stacked RED FLAGS (margin decline + serial M&A + insider selling + auditor change)',
    ],
  },
  {
    id: 'gut', roman: 'VIII',
    title: 'The Five-Year Gut Check',
    subtitle: 'The final question',
    items: [
      'I would be comfortable owning this if the market closed for five years tomorrow',
    ],
  },
];

const TOTAL_ITEMS = CHECKLIST.reduce((s, sec) => s + sec.items.length, 0);

// ─── Helpers ───────────────────────────────────────────────────────────────
const blankAnalysis = () => ({
  id: 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
  ticker: '', company: '', thesis: '',
  createdAt: new Date().toISOString(),
  updatedAt: new Date().toISOString(),
  answers: {},
  verdict: 'pending',
  currentPrice: '', buyPrice: '', sellPrice: '',
  finalNotes: '',
});
const keyOf = (sectionId, idx) => sectionId + '-' + idx;
const countAnswered = (a) => Object.values(a.answers || {}).filter(x => x && x.answer && x.answer !== 'unset').length;
const countYes = (a) => Object.values(a.answers || {}).filter(x => x && x.answer === 'yes').length;
const countNo = (a) => Object.values(a.answers || {}).filter(x => x && x.answer === 'no').length;
const fmtDate = (iso) => {
  try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return ''; }
};

// ─── MAIN ──────────────────────────────────────────────────────────────────
function MungerChecklist() {
  const [view, setView] = useState('analysis');
  const [current, setCurrent] = useState(blankAnalysis());
  const [watchlist, setWatchlist] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');
  const [expanded, setExpanded] = useState({ competence: true });
  const [toast, setToast] = useState('');
  const toastTimer = useRef(null);

  useEffect(() => { loadAll(); }, []);

  async function loadAll() {
    setLoading(true);
    try {
      const list = await storage.list('analysis:');
      const keys = list.keys || [];
      const items = [];
      for (const k of keys) {
        try {
          const r = await storage.get(k);
          if (r && r.value) items.push(JSON.parse(r.value));
        } catch (e) {}
      }
      items.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      setWatchlist(items);
    } catch (e) { console.error(e); }
    finally { setLoading(false); }
  }

  function showToast(msg) {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2200);
  }

  async function saveCurrent() {
    if (!current.ticker.trim()) { showToast('Ticker required'); return; }
    const updated = { ...current, updatedAt: new Date().toISOString() };
    try {
      await storage.set('analysis:' + updated.id, JSON.stringify(updated));
      setCurrent(updated);
      await loadAll();
      showToast('Saved to watchlist');
    } catch (e) { console.error(e); showToast('Save failed'); }
  }

  async function saveAndExit() {
    if (!current.ticker.trim()) { showToast('Ticker required'); return; }
    await saveCurrent();
    setCurrent(blankAnalysis());
    setExpanded({ competence: true });
    setView('watchlist');
  }

  async function deleteAnalysis(id) {
    try { await storage.delete('analysis:' + id); await loadAll(); showToast('Deleted'); }
    catch (e) { console.error(e); }
  }

  function newAnalysis() {
    setCurrent(blankAnalysis());
    setExpanded({ competence: true });
    setView('analysis');
  }

  function loadIntoEditor(item) {
    setCurrent(item);
    setExpanded({ competence: true });
    setView('analysis');
  }

  function setField(key, value) { setCurrent(c => ({ ...c, [key]: value })); }
  function setAnswer(sectionId, idx, answer) {
    const k = keyOf(sectionId, idx);
    setCurrent(c => {
      const prev = c.answers[k] || { answer: 'unset', note: '' };
      return { ...c, answers: { ...c.answers, [k]: { ...prev, answer: prev.answer === answer ? 'unset' : answer } } };
    });
  }
  function setNote(sectionId, idx, note) {
    const k = keyOf(sectionId, idx);
    setCurrent(c => {
      const prev = c.answers[k] || { answer: 'unset', note: '' };
      return { ...c, answers: { ...c.answers, [k]: { ...prev, note } } };
    });
  }
  function toggleSection(id) { setExpanded(e => ({ ...e, [id]: !e[id] })); }

  const filteredWatchlist = watchlist.filter(a => filter === 'all' ? true : a.verdict === filter);

  return (
    <div className="mc-root">
      <header className="px-6 md:px-12 pt-10 pb-6 max-w-6xl mx-auto">
        <div className="flex items-baseline justify-between flex-wrap gap-3">
          <div>
            <div className="mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--gold)' }}>
              The Quarterly Ledger
            </div>
            <h1 className="mc-display text-4xl md:text-6xl font-black mt-1" style={{ color: 'var(--ink)' }}>
              Munger's Checklist
            </h1>
            <p className="italic mt-2 text-base md:text-lg" style={{ color: 'var(--ink-2)' }}>
              Read the report. Invert the thesis. Wait for the fat pitch.
            </p>
          </div>
          <div className="mc-mono text-xs" style={{ color: 'var(--ink-3)' }}>
            {watchlist.length} ENTR{watchlist.length === 1 ? 'Y' : 'IES'} ON FILE
          </div>
        </div>
        <div className="mc-rule-thick mt-6" />
        <div className="flex items-center mt-4">
          <button className={'mc-tab ' + (view === 'analysis' ? 'active' : '')} onClick={() => setView('analysis')}>New Analysis</button>
          <button className={'mc-tab ' + (view === 'watchlist' ? 'active' : '')} onClick={() => setView('watchlist')}>Watchlist</button>
          <div className="ml-auto">
            {view === 'watchlist' && (
              <button className="mc-btn" onClick={newAnalysis}>
                <Plus size={12} className="inline mr-1.5 -mt-0.5" /> New Analysis
              </button>
            )}
          </div>
        </div>
      </header>

      <main className="px-6 md:px-12 pb-24 max-w-6xl mx-auto">
        {view === 'analysis' ? (
          <AnalysisView
            current={current} setField={setField} setAnswer={setAnswer} setNote={setNote}
            expanded={expanded} toggleSection={toggleSection}
            saveCurrent={saveCurrent} saveAndExit={saveAndExit}
          />
        ) : (
          <WatchlistView
            loading={loading} items={filteredWatchlist} allCount={watchlist.length}
            filter={filter} setFilter={setFilter}
            onOpen={loadIntoEditor} onDelete={deleteAnalysis} onNew={newAnalysis}
          />
        )}
      </main>

      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
          <div className="mc-toast">{toast}</div>
        </div>
      )}
    </div>
  );
}

function AnalysisView({ current, setField, setAnswer, setNote, expanded, toggleSection, saveCurrent, saveAndExit }) {
  const answered = countAnswered(current);
  const yes = countYes(current);
  const no = countNo(current);
  const pct = Math.round((answered / TOTAL_ITEMS) * 100);

  return (
    <div className="mt-6">
      <div className="mc-card p-6 md:p-8">
        <div className="grid grid-cols-1 md:grid-cols-12 gap-5">
          <div className="md:col-span-3">
            <label className="mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--ink-3)' }}>Ticker</label>
            <input className="mc-input mc-mono w-full mt-1.5 px-3 py-2.5 text-2xl font-bold tracking-wider uppercase"
              placeholder="LNSR" value={current.ticker}
              onChange={e => setField('ticker', e.target.value.toUpperCase())} maxLength={8} />
          </div>
          <div className="md:col-span-6">
            <label className="mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--ink-3)' }}>Company</label>
            <input className="mc-input w-full mt-1.5 px-3 py-2.5 text-xl"
              placeholder="LENSAR, Inc." value={current.company}
              onChange={e => setField('company', e.target.value)} />
          </div>
          <div className="md:col-span-3">
            <label className="mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--ink-3)' }}>Status</label>
            <div className="mt-1.5"><VerdictBadge v={current.verdict} large /></div>
          </div>
        </div>

        <div className="mt-5">
          <label className="mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--ink-3)' }}>One-line thesis</label>
          <input className="mc-input w-full mt-1.5 px-3 py-2.5 italic"
            placeholder="Why this is supposedly worth my time…" value={current.thesis}
            onChange={e => setField('thesis', e.target.value)} />
        </div>

        <div className="mt-6">
          <div className="flex justify-between mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--ink-3)' }}>
            <span>Progress · {answered} / {TOTAL_ITEMS}</span>
            <span>
              <span style={{ color: 'var(--moss)' }}>✓ {yes}</span>
              <span className="mx-2">·</span>
              <span style={{ color: 'var(--oxblood)' }}>✗ {no}</span>
            </span>
          </div>
          <div className="mt-2 h-1" style={{ background: 'var(--paper-line)' }}>
            <div className="h-1" style={{ width: pct + '%', background: 'var(--gold)', transition: 'width 200ms' }} />
          </div>
        </div>
      </div>

      <div className="mt-8 space-y-3">
        {CHECKLIST.map(section => (
          <Section
            key={section.id} section={section} answers={current.answers}
            expanded={!!expanded[section.id]} onToggle={() => toggleSection(section.id)}
            onAnswer={(idx, v) => setAnswer(section.id, idx, v)}
            onNote={(idx, v) => setNote(section.id, idx, v)}
          />
        ))}
      </div>

      <div className="mt-10">
        <div className="flex items-baseline gap-3">
          <div className="mc-roman text-4xl">§</div>
          <div>
            <h2 className="mc-display text-3xl font-bold" style={{ color: 'var(--ink)' }}>The Verdict</h2>
            <p className="italic" style={{ color: 'var(--ink-2)' }}>Decide. Set the prices. Walk away if neither hits.</p>
          </div>
        </div>

        <div className="mc-card mt-4 p-6 md:p-8">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            {[
              { v: 'pass', label: 'Pass — On the Watchlist', sub: 'Worth tracking and waiting for the price' },
              { v: 'fail', label: 'Not Pass — Reject', sub: 'In the "too hard" pile. Move on.' },
              { v: 'pending', label: 'Pending — Need More Work', sub: 'Open questions remain' },
            ].map(opt => (
              <button key={opt.v} onClick={() => setField('verdict', opt.v)}
                className={'text-left p-4 transition ' + (current.verdict === opt.v ? 'mc-card' : '')}
                style={{
                  border: '1px solid ' + (current.verdict === opt.v ? 'var(--ink)' : 'var(--rule)'),
                  background: current.verdict === opt.v
                    ? (opt.v === 'pass' ? 'var(--moss-tint)' : opt.v === 'fail' ? 'var(--crimson-tint)' : 'var(--paper-2)')
                    : 'transparent',
                  cursor: 'pointer',
                }}>
                <div className="mc-display font-bold tracking-wide uppercase text-sm"
                  style={{ color: opt.v === 'pass' ? 'var(--moss)' : opt.v === 'fail' ? 'var(--oxblood)' : 'var(--ink-2)' }}>
                  {opt.label}
                </div>
                <div className="text-sm italic mt-1" style={{ color: 'var(--ink-3)' }}>{opt.sub}</div>
              </button>
            ))}
          </div>

          <div className="mt-6 grid grid-cols-1 md:grid-cols-3 gap-5">
            <PriceField label="Current price" hint="What it costs today" value={current.currentPrice} onChange={v => setField('currentPrice', v)} />
            <PriceField label="My buy price" hint="Below this, I act" accent="var(--moss)" value={current.buyPrice} onChange={v => setField('buyPrice', v)} />
            <PriceField label="My sell price" hint="Fair value / exit" accent="var(--oxblood)" value={current.sellPrice} onChange={v => setField('sellPrice', v)} />
          </div>

          <div className="mt-6">
            <label className="mc-display text-xs tracking-widest uppercase" style={{ color: 'var(--ink-3)' }}>
              Final notes — the pre-mortem in plain English
            </label>
            <textarea className="mc-input w-full mt-1.5 px-3 py-2.5 italic" rows={4}
              placeholder="Why I'd own this. What kills it. What I'm waiting for."
              value={current.finalNotes} onChange={e => setField('finalNotes', e.target.value)} />
          </div>

          <div className="mt-6 flex flex-wrap gap-3 items-center">
            <button className="mc-btn" onClick={saveAndExit}>
              <Save size={12} className="inline mr-1.5 -mt-0.5" /> Save &amp; Go to Watchlist
            </button>
            <button className="mc-btn mc-btn-ghost" onClick={saveCurrent}>
              <Bookmark size={12} className="inline mr-1.5 -mt-0.5" /> Save Draft
            </button>
            <div className="ml-auto mc-mono text-xs" style={{ color: 'var(--ink-3)' }}>
              ID · {current.id.slice(0, 14)}
            </div>
          </div>
        </div>

        <p className="mt-6 italic text-sm" style={{ color: 'var(--ink-3)' }}>
          "The big money is not in the buying or the selling, but in the waiting." — Munger
        </p>
      </div>
    </div>
  );
}

function Section({ section, answers, expanded, onToggle, onAnswer, onNote }) {
  const total = section.items.length;
  const answered = section.items.filter((_, i) => {
    const a = answers[keyOf(section.id, i)];
    return a && a.answer && a.answer !== 'unset';
  }).length;
  const yes = section.items.filter((_, i) => answers[keyOf(section.id, i)]?.answer === 'yes').length;
  const no = section.items.filter((_, i) => answers[keyOf(section.id, i)]?.answer === 'no').length;

  return (
    <div className="mc-card">
      <button onClick={onToggle} className="mc-section-toggle w-full p-5 md:p-6 flex items-start gap-5">
        <div className="mc-roman text-4xl md:text-5xl shrink-0 w-12 md:w-16">{section.roman}</div>
        <div className="flex-1 min-w-0">
          <div className="flex items-baseline justify-between gap-4 flex-wrap">
            <h3 className="mc-display text-xl md:text-2xl font-bold" style={{ color: 'var(--ink)' }}>
              {section.title}
            </h3>
            <div className="mc-mono text-xs" style={{ color: 'var(--ink-3)' }}>
              {answered} / {total}
              {(yes > 0 || no > 0) && (
                <span className="ml-3">
                  <span style={{ color: 'var(--moss)' }}>✓{yes}</span>
                  <span className="mx-1">·</span>
                  <span style={{ color: 'var(--oxblood)' }}>✗{no}</span>
                </span>
              )}
            </div>
          </div>
          <p className="italic mt-0.5" style={{ color: 'var(--ink-2)' }}>{section.subtitle}</p>
        </div>
        <div className="shrink-0 mt-1" style={{ color: 'var(--ink-3)' }}>
          {expanded ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
        </div>
      </button>

      {expanded && (
        <div className="px-5 md:px-6 pb-6">
          <div className="mc-rule mb-5" />
          <div className="space-y-5">
            {section.items.map((item, idx) => {
              const a = answers[keyOf(section.id, idx)] || { answer: 'unset', note: '' };
              return (
                <div key={idx} className="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">
                  <div className="md:col-span-7">
                    <div className="flex gap-3">
                      <div className="mc-mono text-xs pt-0.5" style={{ color: 'var(--gold)' }}>
                        {String(idx + 1).padStart(2, '0')}
                      </div>
                      <p className="text-base leading-snug" style={{ color: 'var(--ink)' }}>{item}</p>
                    </div>
                  </div>
                  <div className="md:col-span-5">
                    <div className="grid grid-cols-3 gap-2">
                      <button className={'mc-answer-btn py-2 ' + (a.answer === 'yes' ? 'active-yes' : '')}
                        onClick={() => onAnswer(idx, 'yes')}>
                        <Check size={12} className="inline mr-1 -mt-0.5" /> Yes
                      </button>
                      <button className={'mc-answer-btn py-2 ' + (a.answer === 'no' ? 'active-no' : '')}
                        onClick={() => onAnswer(idx, 'no')}>
                        <XIcon size={12} className="inline mr-1 -mt-0.5" /> No
                      </button>
                      <button className={'mc-answer-btn py-2 ' + (a.answer === 'skip' ? 'active-skip' : '')}
                        onClick={() => onAnswer(idx, 'skip')}>
                        <Minus size={12} className="inline mr-1 -mt-0.5" /> N/A
                      </button>
                    </div>
                    <textarea className="mc-input w-full mt-2 px-2.5 py-2 text-sm italic" rows={2}
                      placeholder="Notes — evidence, page numbers, doubts…"
                      value={a.note} onChange={e => onNote(idx, e.target.value)} />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function PriceField({ label, hint, accent, value, onChange }) {
  return (
    <div>
      <label className="mc-display text-xs tracking-widest uppercase" style={{ color: accent || 'var(--ink-3)' }}>
        {label}
      </label>
      <div className="relative mt-1.5">
        <span className="absolute left-3 top-1/2 -translate-y-1/2 mc-mono text-lg" style={{ color: 'var(--ink-3)' }}>$</span>
        <input className="mc-input mc-mono w-full pl-8 pr-3 py-2.5 text-lg font-bold"
          placeholder="0.00" value={value} onChange={e => onChange(e.target.value)} />
      </div>
      <div className="text-xs italic mt-1" style={{ color: 'var(--ink-3)' }}>{hint}</div>
    </div>
  );
}

function WatchlistView({ loading, items, allCount, filter, setFilter, onOpen, onDelete, onNew }) {
  return (
    <div className="mt-6">
      <div className="flex items-center gap-1 flex-wrap">
        {[
          { v: 'all', label: 'All' },
          { v: 'pass', label: 'Pass' },
          { v: 'pending', label: 'Pending' },
          { v: 'fail', label: 'Not Pass' },
        ].map(f => (
          <button key={f.v} onClick={() => setFilter(f.v)}
            className="mc-display text-xs tracking-widest uppercase px-3 py-1.5"
            style={{
              color: filter === f.v ? 'var(--paper)' : 'var(--ink-2)',
              background: filter === f.v ? 'var(--ink)' : 'transparent',
              border: '1px solid ' + (filter === f.v ? 'var(--ink)' : 'var(--rule)'),
              cursor: 'pointer',
            }}>
            {f.label}
          </button>
        ))}
      </div>

      <div className="mt-6 space-y-3">
        {loading && <EmptyState icon={<CircleDot size={48} />} title="Loading…" sub="Fetching the file room" />}
        {!loading && items.length === 0 && (
          <EmptyState icon={<Inbox size={48} />}
            title={filter === 'all' ? 'Empty file room' : 'Nothing here'}
            sub={filter === 'all' ? 'Run an analysis. Save it. It lands here.' : 'No entries marked "' + filter + '" yet.'}
            cta={filter === 'all' ? <button className="mc-btn mt-4" onClick={onNew}>Begin First Analysis</button> : null}
          />
        )}
        {!loading && items.map(a => (
          <WatchlistRow key={a.id} item={a} onOpen={() => onOpen(a)} onDelete={() => onDelete(a.id)} />
        ))}
      </div>
    </div>
  );
}

function WatchlistRow({ item, onOpen, onDelete }) {
  const answered = countAnswered(item);
  const yes = countYes(item);
  const no = countNo(item);

  return (
    <div className="mc-card p-5 md:p-6">
      <div className="grid grid-cols-1 md:grid-cols-12 gap-4 items-start">
        <div className="md:col-span-3">
          <div className="mc-mono text-3xl font-bold tracking-wider" style={{ color: 'var(--ink)' }}>
            {item.ticker || '—'}
          </div>
          <div className="text-sm mt-0.5" style={{ color: 'var(--ink-2)' }}>
            {item.company || <span className="italic" style={{ color: 'var(--ink-3)' }}>Unnamed</span>}
          </div>
          <div className="mt-2"><VerdictBadge v={item.verdict} /></div>
        </div>

        <div className="md:col-span-5">
          {item.thesis && (
            <div className="italic text-sm mb-2" style={{ color: 'var(--ink-2)' }}>"{item.thesis}"</div>
          )}
          <div className="mc-mono text-xs" style={{ color: 'var(--ink-3)' }}>
            {answered}/{TOTAL_ITEMS} ANSWERED
            <span className="mx-2">·</span>
            <span style={{ color: 'var(--moss)' }}>✓ {yes}</span>
            <span className="mx-1">·</span>
            <span style={{ color: 'var(--oxblood)' }}>✗ {no}</span>
            <span className="mx-2">·</span>
            UPDATED {fmtDate(item.updatedAt).toUpperCase()}
          </div>
          {item.finalNotes && (
            <div className="text-sm mt-2" style={{ color: 'var(--ink-2)', display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
              {item.finalNotes}
            </div>
          )}
        </div>

        <div className="md:col-span-2">
          <PriceMini label="Current" value={item.currentPrice} />
          <PriceMini label="Buy at" value={item.buyPrice} accent="var(--moss)" />
          <PriceMini label="Sell at" value={item.sellPrice} accent="var(--oxblood)" />
        </div>

        <div className="md:col-span-2 flex md:flex-col gap-2 md:items-stretch">
          <button className="mc-btn mc-btn-ghost text-xs" onClick={onOpen}>
            <Edit3 size={11} className="inline mr-1 -mt-0.5" /> Open
          </button>
          <button className="mc-btn mc-btn-ghost text-xs"
            onClick={() => { if (confirm('Delete ' + (item.ticker || 'this entry') + '?')) onDelete(); }}
            style={{ color: 'var(--oxblood)', borderColor: 'var(--oxblood-soft)' }}>
            <Trash2 size={11} className="inline mr-1 -mt-0.5" /> Delete
          </button>
        </div>
      </div>
    </div>
  );
}

function PriceMini({ label, value, accent }) {
  return (
    <div className="flex items-baseline justify-between gap-2 py-0.5">
      <span className="mc-display text-xs tracking-wide uppercase" style={{ color: 'var(--ink-3)' }}>{label}</span>
      <span className="mc-mono text-sm font-bold" style={{ color: accent || 'var(--ink)' }}>
        {value ? '$' + value : '—'}
      </span>
    </div>
  );
}

function VerdictBadge({ v, large }) {
  const labelMap = { pass: 'Pass', fail: 'Not Pass', pending: 'Pending' };
  const cls = v === 'pass' ? 'mc-pill-pass' : v === 'fail' ? 'mc-pill-fail' : 'mc-pill-pending';
  return (
    <span className={'mc-pill ' + cls} style={large ? { fontSize: '0.78rem', padding: '0.35rem 0.7rem' } : {}}>
      {labelMap[v] || 'Pending'}
    </span>
  );
}

function EmptyState({ icon, title, sub, cta }) {
  return (
    <div className="mc-card text-center py-16 px-6">
      <div className="mc-empty-icon flex justify-center">{icon}</div>
      <h3 className="mc-display text-2xl font-bold mt-4" style={{ color: 'var(--ink)' }}>{title}</h3>
      <p className="italic mt-1" style={{ color: 'var(--ink-2)' }}>{sub}</p>
      {cta && <div>{cta}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MungerChecklist />);
</script>
</body>
</html>
